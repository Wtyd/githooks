name: SARIF Contract (on-demand)
# Manual workflow to refresh or verify the SARIF 2.1.0 contract end-to-end
# against GitHub Code Scanning.
#
# Triggered by hand from the Actions UI (or `gh workflow run sarif-contract.yml`).
# Does NOT run on push/PR — the SARIF formatter is covered on every build by
# tests/Unit/Output/SarifResultFormatterSchemaTest (schema + golden).
#
# Jobs:
#   - verify: regenerates the SARIF on the broken-code fixture, uploads it
#     to GitHub Code Scanning (Security → Code Scanning). Confirms that
#     the formatter output is accepted by GitHub's parser.
#   - refresh: uploads the generated SARIF as a plain artifact so the
#     maintainer can download it, diff against the committed golden,
#     and commit the refreshed golden when the formatter changes.
on:
  workflow_dispatch:
    inputs:
      upload-to-code-scanning:
        description: 'Upload SARIF to GitHub Code Scanning (verify mode)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    name: Generate and verify SARIF contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none

      - name: Install dependencies
        run: |
          chmod -R +x tools/*
          tools/composer install --prefer-dist --no-progress

      - name: Generate SARIF on broken-code fixture
        run: |
          php githooks flow sarif-check \
            --config=qa/githooks.sarif-check.php \
            --format=sarif \
            --output=reports/sarif-contract.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: ${{ inputs.upload-to-code-scanning }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/sarif-contract.sarif
          category: sarif-contract

      - name: Upload SARIF as artifact (for golden refresh)
        uses: actions/upload-artifact@v4
        with:
          name: sarif-contract-report
          path: reports/sarif-contract.sarif

      - name: Diff against committed golden
        run: |
          if diff -u tests/Fixtures/sarif/golden-with-violations.json reports/sarif-contract.sarif; then
            echo "Golden is up to date."
          else
            echo "::warning::Generated SARIF differs from golden. Download the artifact and commit the refreshed file if this is intentional."
          fi
