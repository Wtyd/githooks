# GitHooks v3 configuration file (YAML format).
#
# DEPRECATED: YAML configuration is deprecated since v3.0 and will be removed
# in v4.0. Use PHP format (githooks.php) instead for better IDE support and
# the ability to use constants, conditionals, and environment variables.
# Run "githooks conf:init" to generate a PHP configuration file.
#
# Structure: hooks -> flows -> jobs

# hooks:
#   pre-commit:
#     - lint
#   pre-push:
#     - lint
#     - test

flows:
  options:
    fail-fast: false
    processes: 1
  lint:
    jobs:
      - phpcs_src

jobs:
  phpcs_src:
    type: phpcs
    paths:
      - src
    standard: PSR12

